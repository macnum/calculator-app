<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <h1>Calculator</h1>
    <div class="calc">
        <div class="container">
            <div class="display">
                <div class="content"></div>
            </div>
            <hr>
            <div class="calc-pad">
                <div class="row-1 row">
                    <div class="item seven">7</div>
                    <div class="item eight">4</div>
                    <div class="item nine">1</div>
                    <div class="item divide">0</div>
                </div>
                <div class="row-2 row">
                    <div class="item four">8</div>
                    <div class="item five">5</div>
                    <div class="item six">2</div>
                    <div class="item dot">.</div>
                </div>
                <div class="row-3 row" >
                    <div class="item one">9</div>
                    <div class="item two">6</div>
                    <div class="item three">3</div>
                    <div class="item minus">+</div>
                </div>
                <div class="row-4 row">
                    <div class="item zero">÷</div>
                    <div class="item pow">x</div>
                    <div class="item plus">-</div>
                    <div class="item equal-to">=</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
